<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waveguide Generator</title>
    <link rel="stylesheet" href="src/style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "./node_modules/three/build/three.module.js",
          "three/addons/": "./node_modules/three/examples/jsm/"
        }
      }
    </script>
  </head>

  <body>
    <a href="#canvas-container" class="skip-link">Skip to 3D viewer</a>
    <button
      class="mobile-panel-toggle"
      id="mobile-panel-toggle"
      aria-label="Toggle parameter panel"
      aria-expanded="false"
    >
      ☰
    </button>
    <div
      class="mobile-panel-backdrop"
      id="mobile-panel-backdrop"
      aria-hidden="true"
    ></div>
    <div id="ui-panel">
      <div class="panel-header">
        <h1>Waveguide Generator</h1>
        <button
          class="panel-close-btn"
          id="panel-close-btn"
          aria-label="Close panel"
        >
          ✕
        </button>
      </div>

      <!-- Tab Navigation -->
      <div class="tab-navigation" role="tablist" aria-label="Main panels">
        <button
          class="tab-btn active"
          id="geometry-tab-btn"
          data-tab="geometry"
          role="tab"
          aria-controls="geometry-tab"
          aria-selected="true"
          tabindex="0"
        >
          Geometry
        </button>
        <button
          class="tab-btn"
          id="simulation-tab-btn"
          data-tab="simulation"
          role="tab"
          aria-controls="simulation-tab"
          aria-selected="false"
          tabindex="-1"
        >
          Simulation
        </button>
      </div>

      <!-- Geometry Tab Content -->
      <div
        id="geometry-tab"
        class="tab-content active"
        role="tabpanel"
        aria-labelledby="geometry-tab-btn"
      >
        <div id="param-container"></div>
      </div>

      <!-- Simulation Tab Content -->
      <div
        id="simulation-tab"
        class="tab-content"
        role="tabpanel"
        aria-labelledby="simulation-tab-btn"
        hidden
      >
        <div id="simulation-settings-container"></div>
        <div id="polar-settings-container"></div>
        <div id="simulation-param-container"></div>
      </div>
    </div>
    <div id="ui-panel-resizer" aria-hidden="true"></div>
    <div id="actions-panel">
      <details id="actions-panel-details" open>
        <summary>
          Actions <span id="stats">Vertices: 0 | Triangles: 0</span>
        </summary>
        <div class="actions-section">
          <div
            class="status-indicator status-prominent"
            role="status"
            aria-live="polite"
            aria-atomic="true"
          >
            <span id="solver-status" class="status-dot"></span>
            <span id="solver-status-text">Checking connection...</span>
          </div>
        </div>
        <div class="section actions-section">
          <button id="render-btn" class="is-hidden">Update Model</button>

          <h4 class="actions-group-title">Project</h4>
          <div class="button-row">
            <button id="load-config-btn" class="secondary">Load Config</button>
            <button id="export-config-btn" class="secondary">
              Export Config
            </button>
          </div>
          <input
            type="file"
            id="config-upload"
            class="is-hidden"
            accept=".txt,.cfg"
          />
          <input type="file" id="mesh-upload" class="is-hidden" accept=".msh" />
          <div id="imported-mesh-banner" class="imported-mesh-banner is-hidden">
            <span id="imported-mesh-filename"></span>
            <button id="return-parametric-btn" class="secondary">
              Return to Parametric
            </button>
          </div>
          <div class="button-row">
            <button id="import-mesh-btn" class="secondary">Import Mesh</button>
            <button id="settings-btn" class="secondary">Settings</button>
          </div>

          <hr />
          <h4 class="actions-group-title">Output & Viewer</h4>
          <div class="button-row">
            <div class="input-row">
              <label for="export-prefix"
                >Output Name
                <span class="required-indicator" aria-hidden="true"
                  >*</span
                ></label
              >
              <input
                type="text"
                id="export-prefix"
                value="horn_design"
                maxlength="128"
                pattern="[a-zA-Z0-9_\-]+"
                title="Only letters, numbers, underscore, and hyphen allowed"
                aria-describedby="export-prefix-help"
                aria-required="true"
                required
              />
              <small id="export-prefix-help" class="input-help-text"
                >Max 128 characters. Use only letters, numbers, - and _</small
              >
            </div>
            <div class="input-row">
              <label for="export-counter"
                >Counter
                <span class="required-indicator" aria-hidden="true"
                  >*</span
                ></label
              >
              <input
                type="number"
                id="export-counter"
                value="1"
                min="1"
                max="999999"
                step="1"
                aria-describedby="export-counter-help"
                aria-required="true"
                required
              />
              <small id="export-counter-help" class="input-help-text"
                >1 to 999,999</small
              >
            </div>
          </div>
          <hr />
          <h4 class="actions-group-title">Simulation</h4>
          <div id="simulation-progress" class="is-hidden">
            <div
              id="simulation-progressbar"
              class="progress-bar"
              role="progressbar"
              aria-label="Simulation progress"
              aria-valuemin="0"
              aria-valuemax="100"
              aria-valuenow="0"
              aria-valuetext="Not started"
            >
              <div id="progress-fill" class="progress-fill"></div>
            </div>
            <p
              id="progress-text"
              class="progress-text"
              role="status"
              aria-live="polite"
            ></p>
          </div>
          <div class="button-row">
            <button id="run-simulation-btn" class="primary-action">
              Start BEM Simulation
            </button>
            <button
              id="stop-simulation-btn"
              class="secondary button-compact"
              disabled
            >
              Stop
            </button>
          </div>
          <div
            id="simulation-mesh-diagnostics"
            class="simulation-mesh-diagnostics"
            role="status"
            aria-live="polite"
          >
            <div class="simulation-mesh-diagnostics-placeholder">
              Mesh stats appear here before you submit.
            </div>
          </div>
          <div id="simulation-jobs" class="simulation-jobs">
            <div class="simulation-jobs-header">
              <span>Simulations</span>
              <div class="simulation-jobs-header-actions">
                <button
                  id="choose-folder-btn"
                  class="secondary button-compact"
                  type="button"
                  title="Choose output folder"
                >
                  Folder
                </button>
                <button
                  id="clear-failed-jobs-btn"
                  class="secondary button-compact"
                  type="button"
                >
                  Clear Failed
                </button>
                <button
                  id="refresh-jobs-btn"
                  class="secondary button-compact button-icon-only"
                  type="button"
                  title="Refresh"
                  aria-label="Refresh job list"
                >
                  ↻
                </button>
              </div>
            </div>
            <div id="simulation-jobs-list" class="simulation-jobs-list"></div>
          </div>
        </div>
      </details>
    </div>

    <div id="canvas-container">
      <div class="viewer-controls">
        <button id="zoom-in" title="Zoom In" aria-label="Zoom in">+</button>
        <button id="zoom-out" title="Zoom Out" aria-label="Zoom out">−</button>
        <button
          id="focus-horn"
          title="Focus on Model"
          aria-label="Focus on model"
        >
          ⊙
        </button>
        <button
          id="camera-toggle"
          title="Toggle Camera"
          aria-label="Toggle camera"
        >
          ⬚
        </button>
      </div>
    </div>

    <script src="./node_modules/jszip/dist/jszip.min.js"></script>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
